<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Acceso | Rendicion</title>
  <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="login-copy" aria-label="Resumen del sistema">
      <div class="brand login-brand">
        <span class="brand-mark">R</span>
        <div class="app-title">
          <strong>Rendicion</strong>
          <span>Cuadratura operacional</span>
        </div>
      </div>
      <h1>Control de depositos y cuadraturas</h1>
      <p>Acceso seguro para revisar turnos, rendiciones, operadores y reportes diarios.</p>
      <div class="login-metrics">
        <span>DB local</span>
        <span>OCR boletas</span>
        <span>Reportes Excel</span>
      </div>
    </section>
    <section class="login-panel">
      <p class="eyebrow">Acceso al sistema</p>
      <h2>Iniciar sesion</h2>
      {% if error %}<p class="alert">{{ error }}</p>{% endif %}
      <form method="post" action="/login" class="form-grid login-form">
        <label>Usuario<input name="codigo" autocomplete="username" required></label>
        <label>Password<input name="password" type="password" autocomplete="current-password" required></label>
        <button type="submit">Ingresar</button>
      </form>
    </section>
  </main>
</body>
</html>
