{% extends "base.html" %}
{% block content %}
<section class="surface form-surface">
  <form method="post" action="/configuracion" class="form-grid">
    <label>Empresa<input name="empresa" value="{{ item.empresa }}"></label>
    <label>RUT<input name="rut" value="{{ item.rut }}"></label>
    <label>Local<input name="local" value="{{ item.local }}"></label>
    <label>E-mail<input name="email" type="email" value="{{ item.email }}"></label>
    <label class="full">Membrete<textarea name="membrete" rows="5">{{ item.membrete }}</textarea></label>
    <div class="form-actions">
      <button type="submit">Guardar</button>
    </div>
  </form>
</section>
{% endblock %}
